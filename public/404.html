<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | Qode27</title>
    <meta name="theme-color" content="#0B0B0B" />
    <style>
      :root {
        color-scheme: light;
        --black: #0b0b0b;
        --gold: #c89b3c;
        --blue: #17c5ff;
        --border: #e5e7eb;
        --text: #6b7280;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, Arial, sans-serif;
        background:
          radial-gradient(circle at top, rgba(200, 155, 60, 0.12), transparent 30%),
          radial-gradient(circle at 20% 20%, rgba(23, 197, 255, 0.08), transparent 22%),
          #fff;
        color: var(--black);
        padding: 24px;
      }

      .card {
        width: min(100%, 640px);
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: 0 22px 54px rgba(11, 11, 11, 0.08);
        padding: 32px;
      }

      .eyebrow {
        margin: 0 0 12px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #946d23;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.25rem, 6vw, 3.5rem);
        line-height: 1.02;
      }

      p {
        margin: 16px 0 0;
        font-size: 1rem;
        line-height: 1.8;
        color: var(--text);
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 24px;
        min-height: 48px;
        padding: 0 20px;
        border-radius: 12px;
        background: var(--black);
        border: 1px solid var(--black);
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s ease;
      }

      a:hover {
        border-color: var(--gold);
        box-shadow: 0 16px 32px rgba(200, 155, 60, 0.18);
        transform: translateY(-2px);
      }

      .accent {
        color: var(--gold);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">Qode27</p>
      <h1>Page <span class="accent">not found</span></h1>
      <p>The page you are looking for does not exist or may have moved. Return to the Qode27 homepage to continue browsing.</p>
      <a href="/">Go to Homepage</a>
    </main>
  </body>
  </html>
