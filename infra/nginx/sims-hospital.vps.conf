server {
    listen 80;
    listen [::]:80;
    server_name kansalt.com www.kansalt.com;

    return 301 https://www.kansalt.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kansalt.com;

    ssl_certificate /etc/letsencrypt/live/kansalt.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kansalt.com/privkey.pem;

    return 301 https://www.kansalt.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.kansalt.com;

    ssl_certificate /etc/letsencrypt/live/kansalt.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kansalt.com/privkey.pem;

    client_max_body_size 25M;

    location = /hms {
        return 301 https://www.kansalt.com/sims;
    }

    location ^~ /hms/ {
        return 301 https://www.kansalt.com/sims;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:4100/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
