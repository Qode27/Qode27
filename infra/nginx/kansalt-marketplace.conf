map $host $app_upstream {
    default http://kansalt_frontend;
    kansalt.com http://kansalt_frontend;
    www.kansalt.com http://kansalt_frontend;
    hms.kansalt.com http://hms_app;
    hrms.kansalt.com http://hrms_app;
    crm.kansalt.com http://crm_app;
}

upstream kansalt_frontend {
    server kansalt-frontend:3000;
}

upstream api_gateway {
    server api-gateway:4000;
}

upstream hms_app {
    server hms-app:80;
}

upstream hrms_app {
    server hrms-app:80;
}

upstream crm_app {
    server crm-app:80;
}

server {
    listen 80;
    server_name kansalt.com www.kansalt.com;

    location /api/ {
        proxy_pass http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://kansalt_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name ~^(?<app_subdomain>.+)\.kansalt\.com$;

    location / {
        proxy_pass $app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_domain ~(?i)^([^;]+)$ .kansalt.com;
    }
}
