apiVersion: v1
kind: ConfigMap
metadata:
  name: kansalt-platform-env
data:
  NODE_ENV: "production"
  API_GATEWAY_PORT: "4000"
  AUTH_SERVICE_PORT: "4001"
  HMS_SERVICE_PORT: "4002"
  HRMS_SERVICE_PORT: "4003"
  USER_SERVICE_PORT: "4010"
  BILLING_SERVICE_PORT: "4011"
  NOTIFICATION_SERVICE_PORT: "4012"
  APP_SERVICE_PORT: "4013"
  AUTH_SERVICE_URL: "http://auth-service:4001"
  HMS_SERVICE_URL: "http://hms-service:4002"
  HRMS_SERVICE_URL: "http://hrms-service:4003"
  USER_SERVICE_URL: "http://user-service:4010"
  BILLING_SERVICE_URL: "http://billing-service:4011"
  NOTIFICATION_SERVICE_URL: "http://notification-service:4012"
  APP_SERVICE_URL: "http://app-service:4013"
  NEXT_PUBLIC_API_BASE_URL: "/api"
  AUTH_COOKIE_DOMAIN: ".kansalt.com"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kansalt-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kansalt-frontend
  template:
    metadata:
      labels:
        app: kansalt-frontend
    spec:
      containers:
        - name: kansalt-frontend
          image: kansalt/kansalt-frontend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: kansalt-platform-env
---
apiVersion: v1
kind: Service
metadata:
  name: kansalt-frontend
spec:
  selector:
    app: kansalt-frontend
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: kansalt/api-gateway:latest
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: kansalt-platform-env
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - port: 4000
      targetPort: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: kansalt/auth-service:latest
          ports:
            - containerPort: 4001
          envFrom:
            - configMapRef:
                name: kansalt-platform-env
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - port: 4001
      targetPort: 4001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hms-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hms-service
  template:
    metadata:
      labels:
        app: hms-service
    spec:
      containers:
        - name: hms-service
          image: kansalt/hms-service:latest
          ports:
            - containerPort: 4002
          envFrom:
            - configMapRef:
                name: kansalt-platform-env
---
apiVersion: v1
kind: Service
metadata:
  name: hms-service
spec:
  selector:
    app: hms-service
  ports:
    - port: 4002
      targetPort: 4002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hrms-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hrms-service
  template:
    metadata:
      labels:
        app: hrms-service
    spec:
      containers:
        - name: hrms-service
          image: kansalt/hrms-service:latest
          ports:
            - containerPort: 4003
          envFrom:
            - configMapRef:
                name: kansalt-platform-env
---
apiVersion: v1
kind: Service
metadata:
  name: hrms-service
spec:
  selector:
    app: hrms-service
  ports:
    - port: 4003
      targetPort: 4003
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: kansalt/user-service:latest
          ports:
            - containerPort: 4010
          envFrom:
            - configMapRef:
                name: kansalt-platform-env
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector:
    app: user-service
  ports:
    - port: 4010
      targetPort: 4010
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-service
  template:
    metadata:
      labels:
        app: app-service
    spec:
      containers:
        - name: app-service
          image: kansalt/app-service:latest
          ports:
            - containerPort: 4013
          envFrom:
            - configMapRef:
                name: kansalt-platform-env
---
apiVersion: v1
kind: Service
metadata:
  name: app-service
spec:
  selector:
    app: app-service
  ports:
    - port: 4013
      targetPort: 4013
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
    spec:
      containers:
        - name: billing-service
          image: kansalt/billing-service:latest
          ports:
            - containerPort: 4011
          envFrom:
            - configMapRef:
                name: kansalt-platform-env
---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
spec:
  selector:
    app: billing-service
  ports:
    - port: 4011
      targetPort: 4011
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: kansalt/notification-service:latest
          ports:
            - containerPort: 4012
          envFrom:
            - configMapRef:
                name: kansalt-platform-env
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - port: 4012
      targetPort: 4012
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kansalt-platform
spec:
  rules:
    - host: kansalt.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 4000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kansalt-frontend
                port:
                  number: 3000
